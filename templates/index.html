<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Prediction System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #34495e;
            font-weight: 600;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover {
            background-color: #c0392b;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            display: none;
        }
        .danger {
            background-color: #fde8e8;
            color: #e74c3c;
            border: 1px solid #f8b4b4;
        }
        .safe {
            background-color: #edf7ed;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>❤️ Heart Disease Prediction Portal</h2>
    <form id="predictionForm">
        <div class="form-group">
            <label for="age">Age (years):</label>
            <input type="number" id="age" name="age" min="1" max="120" required value="55">
        </div>
        <div class="form-group">
            <label for="sex">Sex:</label>
            <select id="sex" name="sex" required>
                <option value="1">Male</option>
                <option value="0">Female</option>
            </select>
        </div>
        <div class="form-group">
            <label for="cp">Chest Pain Type:</label>
            <select id="cp" name="cp" required>
                <option value="0">Typical Angina (0)</option>
                <option value="1">Atypical Angina (1)</option>
                <option value="2">Non-anginal Pain (2)</option>
                <option value="3">Asymptomatic (3)</option>
            </select>
        </div>
        <div class="form-group">
            <label for="trestbps">Resting Blood Pressure (mm Hg):</label>
            <input type="number" id="trestbps" name="trestbps" min="50" max="250" required value="130">
        </div>
        <div class="form-group">
            <label for="chol">Serum Cholesterol (mg/dl):</label>
            <input type="number" id="chol" name="chol" min="100" max="600" required value="240">
        </div>
        <div class="form-group">
            <label for="thalach">Maximum Heart Rate Achieved:</label>
            <input type="number" id="thalach" name="thalach" min="60" max="220" required value="150">
        </div>
        <button type="submit">Analyze Patient Data</button>
    </form>

    <div id="result" class="result-box"></div>
</div>

<script>
    document.getElementById('predictionForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'none';

        // Collect form data
        const formData = {
            age: parseFloat(document.getElementById('age').value),
            sex: parseFloat(document.getElementById('sex').value),
            cp: parseFloat(document.getElementById('cp').value),
            trestbps: parseFloat(document.getElementById('trestbps').value),
            chol: parseFloat(document.getElementById('chol').value),
            thalach: parseFloat(document.getElementById('thalach').value)
        };

        try {
            // Send request to Flask API backend
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            const result = await response.json();
            resultDiv.style.display = 'block';

            if (result.heart_disease_predicted === 1) {
                resultDiv.className = 'result-box danger';
                resultDiv.innerHTML = `⚠️ High Risk! Heart Disease Detected.<br><small>Confidence: ${(result.probability * 100).toFixed(2)}%</small>`;
            } else {
                resultDiv.className = 'result-box safe';
                resultDiv.innerHTML = `💚 Low Risk. No Heart Disease Detected.<br><small>Confidence: ${((1 - result.probability) * 100).toFixed(2)}%</small>`;
            }
        } catch (error) {
            resultDiv.style.display = 'block';
            resultDiv.className = 'result-box danger';
            resultDiv.innerText = 'Error connecting to server application.';
        }
    });
</script>

</body>
</html>
